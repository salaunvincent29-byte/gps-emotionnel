<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#12366d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GPS émotionnel">
  <title>GPS émotionnel</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Outil personnel d’auto-observation</p>
      <h1>GPS émotionnel</h1>
    </div>
    <button id="settingsBtn" class="icon-btn" type="button" aria-label="Réglages">⚙</button>
  </header>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <nav class="bottom-nav" aria-label="Navigation principale">
    <button data-view="home" class="nav-btn active" type="button">Accueil</button>
    <button data-view="history" class="nav-btn" type="button">Historique</button>
    <button data-view="sources" class="nav-btn" type="button">Sources</button>
  </nav>

  <dialog id="settingsDialog">
    <div class="dialog-head">
      <h2>Réglages</h2>
      <button id="closeSettings" class="icon-btn" type="button" aria-label="Fermer">✕</button>
    </div>
    <label class="setting-row">Taille du texte
      <select id="fontSizeSelect">
        <option value="normal">Normale</option>
        <option value="large">Grande</option>
        <option value="xlarge">Très grande</option>
      </select>
    </label>
    <label class="setting-row"><input id="contrastToggle" type="checkbox"> Contraste renforcé</label>
    <label class="setting-row"><input id="motionToggle" type="checkbox"> Réduire les animations</label>
    <button id="clearHistoryBtn" class="danger-btn" type="button">Effacer l’historique</button>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
