<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#315f75">
  <meta name="description" content="GPS émotionnel de poche : partir des sensations corporelles pour formuler des hypothèses émotionnelles.">
  <title>GPS émotionnel V3</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="brand-kicker">OUTIL DE POCHE</p>
      <h1>GPS émotionnel</h1>
    </div>
    <button id="settingsBtn" class="icon-button" type="button" aria-label="Ouvrir les réglages">Aa</button>
  </header>

  <main id="app" class="app-main" aria-live="polite"></main>

  <nav class="bottom-nav" aria-label="Navigation principale">
    <button class="nav-btn active" data-view="home" type="button"><span>⌂</span>Accueil</button>
    <button class="nav-btn" data-view="history" type="button"><span>▤</span>Historique</button>
    <button class="nav-btn" data-view="about" type="button"><span>i</span>Comprendre</button>
  </nav>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog">
      <div class="dialog-head">
        <h2>Réglages d’affichage</h2>
        <button class="icon-button" value="cancel" aria-label="Fermer">×</button>
      </div>

      <label class="field">
        <span>Taille du texte</span>
        <select id="fontSizeSelect">
          <option value="normal">Normale</option>
          <option value="large">Grande</option>
          <option value="xlarge">Très grande</option>
        </select>
      </label>

      <label class="switch-row">
        <input id="contrastToggle" type="checkbox">
        <span>Contraste renforcé</span>
      </label>

      <label class="switch-row">
        <input id="motionToggle" type="checkbox">
        <span>Réduire les animations</span>
      </label>

      <button id="saveSettingsBtn" class="primary-btn" value="default">Enregistrer</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
