<style>:root{--bg:#f3f7f8;--card:#fff;--ink:#17272f;--muted:#5f7179;--line:#d7e1e5;--accent:#285f76;--soft:#e2eef2;--yes:#23764b;--no:#59666d;--maybe:#986514;--font:17px}

t-weight:900}.row{display:flex;justify-content:space-between;align-items:center;gap:12px}.progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:7px}.progress{height:10px;border-radius:999px;background:#dfe7ea;overflow:hidden;margin-bottom:14px}.progress div{height:100%;background:var(--accent);border-radius:999px}.qcard{min-height:440px;display:flex;flex-direction:column}.zone{display:inline-flex;align-self:flex-start;padding:7px 10px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:.82rem;font-weight:850}.question{font-size:1.65rem;margin:20px 0 8px}.help{color:var(--muted);margin:0}.answers{display:grid;gap:10px;margin-top:auto;padding-top:22px}.answer{margin:0;text-align:left;border:1px solid var(--line)}.yes{background:#edf7f1;border-color:#bedfca;color:#164d31}.no{background:#f1f4f5;color:#39464d}.unsure{background:#fbf2e4;border-color:#e5cca4;color:#6d4708}.confirmation{padding:10px;border-radius:12px;background:var(--soft);color:var(--accent);font-weight:850;text-align:center;margin-top:12px}.tier{margin-top:10px;font-size:.75rem;color:var(--muted)}.mix{display:grid;gap:13px;margin:20px 0}.mixrow{display:grid;grid-template-columns:112px 1fr 45px;gap:9px;align-items:center}.bar{height:14px;border-radius:999px;background:#e1e8eb;overflow:hidden}.bar div{height:100%;background:var(--accent);border-radius:999px}.pct{text-align:right;font-weight:900}.evidence{padding:12px;border:1px solid var(--line);border-radius:14px;margin-top:9px;background:#fbfcfc}.evidence p{margin:.3rem 0}.tag{display:inline-block;padding:6px 8px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:.78rem;font-weight:800;margin:3px}.field{display:grid;gap:7px;margin:15px 0;font-weight:800}.field input,.field textarea,.field select{width:100%;padding:12px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--ink)}.field textarea{min-height:90px}.map{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.map button{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:14px;text-align:left}.map .icon{font-size:1.5rem;display:block}.history-item{padding:14px 0;border-top:1px solid var(--line)}.history-item:first-child{border-top:0}nav{position:fixed;bottom:0;left:0;right:0;z-index:12;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:7px 5px calc(7px + env(safe-area-inset-bottom))}nav button{border:0;background:transparent;color:var(--muted);font-size:.73rem;font-weight:800;padding:6px}nav button.active{color:var(--accent)}dialog{width:min(92vw,500px);border:0;border-radius:20px;padding:18px;background:var(--card);color:var(--ink)}dialog::backdrop{background:rgba(0,0,0,.35)}.check{display:block;padding:13px 0;border-top:1px solid var(--line)}.font-large{--font:19px}.font-xlarge{--font:22px}.high-contrast{--bg:#fff;--card:#fff;--ink:#000;--muted:#222;--line:#000;--accent:#003f59;--soft:#d7edf6}.reduce-motion *{transition:none!important;animation:none!important}@media(max-width:480px){main{padding:12px}.card{padding:17px}.grid,.map{grid-template-columns:1fr}.question{font-size:1.45rem}.mixrow{grid-template-columns:100px 1fr 42px}}.hidden{display:none!important}.map-instruction,.map-caption{text-align:center;color:var(--muted)}.map-mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.map-tab{border:1px solid var(--line);border-radius:999px;background:var(--card);padding:10px;font-weight:800}.map-tab.active{background:var(--accent);color:#fff}.body-map-layout{display:grid;grid-template-columns:minmax(220px,1fr) minmax(230px,1.1fr);gap:15px;align-items:center}.body-map-stage{background:radial-gradient(circle,var(--soft),transparent 69%);border-radius:28px}.body-map-svg{width:100%;max-height:500px}.body-outline{fill:none;stroke:var(--muted);stroke-width:4;stroke-linecap:round;opacity:.45}.svg-zone{cursor:pointer}.zone-shape{fill:var(--card);stroke:var(--line);stroke-width:2}.svg-zone:hover .zone-shape,.zone-shape.active-zone{fill:var(--soft);stroke:var(--accent);stroke-width:4}.svg-zone text{font-size:9px;font-weight:900;text-anchor:middle;fill:var(--ink);pointer-events:none}.zone-title{text-align:center;font-size:1.25rem;font-weight:900;color:var(--accent);margin-bottom:12px}.emotion-orbit{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.emotion-bubble{min-height:86px;border:2px solid var(--line);border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:850}.bubble-icon{font-size:1.7rem}.compass-wrap{position:relative;width:min(100%,560px);aspect-ratio:1;margin:auto;border:2px solid var(--line);border-radius:24px;overflow:hidden}.axis{position:absolute;background:var(--muted);opacity:.45}.axis-h{left:7%;right:7%;top:50%;height:2px}.axis-v{top:7%;bottom:7%;left:50%;width:2px}.axis-label{position:absolute;font-size:.66rem;font-weight:900;color:var(--muted)}.axis-label.top{top:2%;left:50%;transform:translateX(-50%)}.axis-label.bottom{bottom:2%;left:50%;transform:translateX(-50%)}.axis-label.left{left:0;top:50%;transform:translateY(-50%) rotate(-90deg)}.axis-label.right{right:0;top:50%;transform:translateY(-50%) rotate(90deg)}.compass-emotion{position:absolute;transform:translate(-50%,-50%);width:70px;height:70px;border:2px solid var(--line);border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}.compass-emotion span{font-size:1.3rem}.compass-emotion small{font-size:.65rem}.emotion-hero{display:flex;align-items:center;gap:14px;background:var(--soft);border-radius:18px;padding:14px;margin:12px 0}.emotion-hero>span{font-size:2.6rem}.visual-sequence{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:7px;align-items:stretch}.sequence-step{border:1px solid var(--line);border-radius:16px;padding:11px;text-align:center;display:flex;flex-direction:column;gap:5px}.sequence-step strong{color:var(--accent);font-size:.75rem}.visual-sequence>b{display:grid;place-items:center;color:var(--accent)}.mini-body-and-needs{display:grid;grid-template-columns:170px 1fr;gap:15px;align-items:center;margin:15px 0}.need-tiles{display:grid;gap:8px}.need-tile{border:1px solid var(--line);border-radius:14px;padding:10px}.symptom-pictos{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.symptom-card{border:1px solid var(--line);border-radius:15px;padding:10px;display:flex;align-items:center;gap:9px}.symptom-card>span{width:32px;height:32px;border-radius:50%;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-weight:900;flex:0 0 auto}@media(max-width:560px){.body-map-layout{grid-template-columns:1fr}.emotion-orbit{grid-template-columns:repeat(3,1fr)}.emotion-bubble{min-height:75px;font-size:.72rem}.compass-emotion{width:58px;height:58px}.visual-sequence{grid-template-columns:1fr}.visual-sequence>b{transform:rotate(90deg)}.mini-body-and-needs{grid-template-columns:105px 1fr}.symptom-pictos{grid-template-columns:1fr}}
/* V5.2 — corps humain réaliste et boussole sans chevauchement */
.realistic-map-card{overflow:hidden}
.real-map-layout{display:grid;grid-template-columns:minmax(260px,1.15fr) minmax(230px,.85fr);gap:18px;align-items:center}
.body-view-switch{display:flex;justify-content:center;gap:8px;margin:8px 0 12px}
.body-view-switch button{border:1px solid var(--line);border-radius:999px;padding:8px 18px;background:var(--card);font-weight:800}
.body-view-switch button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.anatomy-stage{display:grid;place-items:center}
.real-body-frame{position:relative;width:100%;max-width:390px;aspect-ratio:.58;overflow:hidden;border-radius:28px;background:linear-gradient(180deg,#eef3f5,#dfe8eb);border:1px solid var(--line)}
.real-body-image{position:absolute;height:100%;width:auto;max-width:none;top:0;filter:saturate(.72) contrast(.97)}
.real-body-frame.front .real-body-image{left:0;transform:translateX(-1%) scale(1.03);transform-origin:left center}
.real-body-frame.back .real-body-image{right:0;transform:translateX(1%) scale(1.03);transform-origin:right center}
.body-crop{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(243,247,248,.96) 0 4%,transparent 12% 88%,rgba(243,247,248,.96) 96% 100%)}
.anatomy-overlay{position:absolute;inset:0}
.anatomy-zone{position:absolute;transform:translate(-50%,-50%);border:2px solid rgba(40,95,118,.55);background:rgba(40,95,118,.13);border-radius:45%;color:transparent;min-width:20px;min-height:20px}
.anatomy-zone:hover,.anatomy-zone:focus,.anatomy-zone.selected{background:rgba(40,95,118,.36);border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,255,255,.75)}
.anatomy-zone span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:.62rem;color:var(--ink);font-weight:900;background:rgba(255,255,255,.84);padding:2px 4px;border-radius:5px;white-space:nowrap;opacity:0}
.anatomy-zone.selected span,.anatomy-zone:focus span{opacity:1}
.view-caption{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:.68rem;font-weight:900;color:var(--accent)}
.image-credit{font-size:.76rem;color:var(--muted);margin-top:12px}.image-credit summary{cursor:pointer;text-align:center}.image-credit p{line-height:1.35}

/* Boussole à quatre secteurs : emplacements fixes */
.compass-v52{position:relative;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;width:min(100%,650px);margin:0 auto;padding:42px;border-radius:28px;background:var(--soft);border:1px solid var(--line)}
.compass-sector{position:relative;min-height:230px;border:2px solid var(--line);border-radius:22px;padding:42px 12px 12px;background:var(--card);transition:opacity .18s}
.compass-sector h3{position:absolute;top:9px;left:12px;margin:0;font-size:.8rem;color:var(--accent);line-height:1.05}.compass-sector h3 small{font-weight:600;color:var(--muted)}
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;height:100%;align-content:center}.sector-grid.one{grid-template-columns:1fr;place-items:center}
.compass-emotion{position:static!important;transform:none!important;width:auto!important;height:auto!important;min-height:74px;border:2px solid var(--line);border-radius:16px;background:#fbfcfc;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px;color:var(--ink)}
.compass-emotion:hover,.compass-emotion:focus{border-color:var(--accent);background:var(--soft)}
.compass-symbol{font-size:1.45rem}.compass-emotion strong{font-size:.76rem;text-align:center}
.compass-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:92px;height:92px;border-radius:50%;display:grid;place-items:center;text-align:center;background:var(--accent);color:#fff;border:6px solid var(--soft);font-size:.7rem;font-weight:900;z-index:4}
.compass-axis{position:absolute;display:flex;justify-content:space-between;color:var(--muted);font-size:.65rem;font-weight:900;pointer-events:none}
.compass-axis.vertical{top:8px;bottom:8px;left:50%;flex-direction:column;align-items:center;transform:translateX(-50%)}
.compass-axis.horizontal{left:8px;right:8px;top:50%;transform:translateY(-50%)}
.compass-controls{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px auto 0;max-width:650px}
.compass-filter{border:1px solid var(--line);border-radius:13px;background:var(--card);padding:10px;font-weight:750}.compass-filter.reset{grid-column:1/-1}
.compass-sector.dimmed{opacity:.18}
.mini-real-body-and-needs{display:grid;grid-template-columns:190px 1fr;gap:16px;align-items:center;margin:16px 0}
.mini-real-body .real-body-frame{max-height:330px}.mini-real-body .anatomy-zone span,.mini-real-body .view-caption{display:none}
@media(max-width:620px){
 .real-map-layout{grid-template-columns:1fr}.real-body-frame{max-width:350px}
 .compass-v52{padding:32px 7px;gap:7px}.compass-sector{min-height:215px;padding:38px 6px 8px}.sector-grid{gap:5px}
 .compass-emotion{min-height:70px;padding:4px}.compass-emotion strong{font-size:.66rem}.compass-center{width:72px;height:72px;font-size:.58rem;border-width:4px}
 .compass-axis{font-size:.55rem}.mini-real-body-and-needs{grid-template-columns:120px 1fr}
}
@media(max-width:390px){
 .compass-v52{padding-left:3px;padding-right:3px}.compass-sector{min-height:205px}
 .compass-emotion strong{font-size:.6rem}.compass-symbol{font-size:1.2rem}
}
</style>
</head>

<header class="top">
  <div><p>QUESTIONNAIRE D’AIDE À L’IDENTIFICATION</p><h1>GPS émotionnel V5.2</h1></div>

<script>'use strict';
const STATES={"joy": {"name": "Joie", "kind": "Émotion probable", "icon": "☀", "function": "Signale une situation favorable et peut favoriser l’approche, l’exploration ou le partage.", "needs": ["continuer", "profiter", "partager"]}, "anger": {"name": "Colère", "kind": "Émotion probable", "icon": "⚡", "function": "Mobilise l’énergie face à un obstacle, une injustice ou une limite dépassée.", "needs": ["limite", "espace", "justice", "action claire"]}, "fear": {"name": "Peur", "kind": "Émotion probable", "icon": "△", "function": "Prépare à se protéger rapidement face à un danger présent.", "needs": ["sécurité", "distance", "aide immédiate"]}, "anxiety": {"name": "Anxiété", "kind": "Émotion probable", "icon": "≈", "function": "Maintient la vigilance face à une menace possible ou anticipée.", "needs": ["prévisibilité", "information", "plan", "réassurance"]}, "disgust": {"name": "Dégoût", "kind": "Émotion probable", "icon": "⊘", "function": "Protège d’un contact, d’une odeur, d’un goût ou d’une situation perçue comme nocive.", "needs": ["éloignement", "arrêt", "protection"]}, "sadness": {"name": "Tristesse", "kind": "Émotion probable", "icon": "☂", "function": "Favorise le ralentissement, la récupération et la recherche de soutien.", "needs": ["repos", "soutien", "temps", "réconfort"]}, "shame": {"name": "Honte", "kind": "Émotion probable", "icon": "○", "function": "Peut apparaître lors d’une exposition sociale difficile et favoriser le retrait ou la réparation.", "needs": ["respect", "sécurité relationnelle", "réparation"]}, "calm": {"name": "Apaisement", "kind": "État de régulation probable", "icon": "≈", "function": "Correspond à une baisse de l’activation et à une restauration des ressources.", "needs": ["maintenir le calme", "repos", "sécurité"]}, "sensory": {"name": "Surcharge sensorielle", "kind": "État non émotionnel possible", "icon": "✦", "function": "Indique surtout que les stimulations dépassent les capacités disponibles du moment.", "needs": ["silence", "obs  exact.map((x,i)=>({i,f:x.pct-Math.floor(x.pct)})).sort((a,b)=>b.f-a.f).slice(0,rem).forEach(x=>flo[x.i].pct++);

       <p>Illustration 3D du corps humain par Goran tek-en, d’après Human Body.jpg, licence CC BY-SA 4.0, Wikimedia Commons. L’application ajoute uniquement des zones interactives superposées.</p>
     </details>
   </div>

   <div id="compassPanel" class="hidden">
     ${emotionCompass()}
   </div>
 </section>`;
 document.querySelectorAll(".anatomy-zone").forEach(b=>b.addEventListener("click",()=>{S.mapZone=b.dataset.zone;map()}));
 document.querySelectorAll("[data-viewbody]").forEach(b=>b.addEventListener("click",()=>{S.bodyView=b.dataset.viewbody;map()}));
 document.querySelectorAll(".emotion-bubble,.compass-emotion").forEach(b=>b.addEventListener("click",()=>{S.mapKey=b.dataset.k;setView("mapDetail")}));
 document.querySelectorAll(".map-tab").forEach(b=>b.addEventListener("click",()=>switchMapMode(b.dataset.mode)));
 document.querySelectorAll(".compass-filter").forEach(b=>b.addEventListener("click",()=>applyCompassFilter(b.dataset.filter)));
}
function switchMapMode(mode){
 document.querySelectorAll(".map-tab").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
 document.getElementById("bodyPanel").classList.toggle("hidden",mode!=="body");
 document.getElementById("compassPanel").classList.toggle("hidden",mode!=="compass");
}
function compassCard(k){
 const s=STATES[k],v=MAP_VISUAL[k];
 return `<button class="compass-emotion" data-k="${k}">
   <span class="compass-symbol">${v.icon}</span>
   <strong>${esc(s.name)}</strong>
 </button>`;
}
function emotionCompass(){
 return `<div class="compass-v52" role="img" aria-label="Boussole émotionnelle sans chevauchement">
   <div class="compass-axis vertical"><span>ÉNERGIE FORTE</span><span>ÉNERGIE FAIBLE</span></div>
   <div class="compass-axis horizontal"><span>DÉSAGRÉABLE</span><span>AGRÉABLE</span></div>

   <section class="compass-sector sector-high-unpleasant">
     <h3>Énergie forte<br><small>désagréable</small></h3>
     <div class="sector-grid">
       ${["fear","anger","anxiety","sensory"].map(compassCard).join("")}
     </div>
   </section>

   <section class="compass-sector sector-high-pleasant">
     <h3>Énergie forte<br><small>agréable</small></h3>
     <div class="sector-grid one">
       ${compassCard("joy")}
     </div>
   </section>

   <section class="compass-sector sector-low-unpleasant">
     <h3>Énergie faible<br><small>désagréable</small></h3>
     <div class="sector-grid">
       ${["sadness","shame","disgust","fatigue"].map(compassCard).join("")}
     </div>
   </section>

   <section class="compass-sector sector-low-pleasant">
     <h3>Énergie faible<br><small>agréable</small></h3>
     <div class="sector-grid one">
       ${compassCard("calm")}
     </div>
   </section>

   <div class="compass-center">ÉTAT<br>DU MOMENT</div>
 </div>
 <div class="compass-controls">
   <button class="compass-filter" data-filter="high">J’ai beaucoup d’énergie</button>
   <button class="compass-filter" data-filter="low">J’ai peu d’énergie</button>
   <button class="compass-filter" data-filter="unpleasant">C’est désagréable</button>
   <button class="compass-filter" data-filter="pleasant">C’est agréable</button>
   <button class="compass-filter reset" data-filter="all">Tout afficher</button>
 </div>
 <p class="map-caption">Chaque émotion possède un emplacement fixe. Aucun libellé ne se superpose.</p>`;
}
function applyCompassFilter(filter){
 const sectorMap={
  high:["sector-high-unpleasant","sector-high-pleasant"],
  low:["sector-low-unpleasant","sector-low-pleasant"],
  unpleasant:["sector-high-unpleasant","sector-low-unpleasant"],
  pleasant:["sector-high-pleasant","sector-low-pleasant"]
 };
 document.querySelectorAll(".compass-sector").forEach(s=>{
   s.classList.toggle("dimmed",filter!=="all"&&!sectorMap[filter].some(c=>s.classList.contains(c)));
 });
}
function symbolForStage(s){
 return ({Visage:"◉",Tête:"◉",Poitrine:"♡",Respiration:"↕",Ventre:"●",Estomac:"●",Gorge:"│",Mains:"✋",Bras:"╱",Jambes:"∧",Muscles:"⌁",Yeux:"◌",Peau:"≈",Bouche:"◡",Sens:"✦",Situation:"□","Corps entier":"◎","Bras et jambes":"↔",Mouvement:"→",Énergie:"⚡"})[s]||"•";
}
function shortenQuestion(q){
 return q.replace(/^Est-ce que /,"").replace(/^Ai-je /,"").replace(/^Mon /,"").replace(/^Ma /,"").replace(/^Mes /,"").replace(/\?$/,"");
}
function mapDetail(){
 const k=S.mapKey,s=STATES[k],v=MAP_VISUAL[k];
 const zones=v.zones.filter(z=>["head","face","throat","chest","belly","arms","legs","senses","breath"].includes(z));
 app.innerHTML=`<section class="card map-detail-visual">
   <button class="secondary" onclick="setView('map')">← Retour</button>
   <div class="emotion-hero"><span>${v.icon}</span><div><p class="eyebrow">${esc(s.kind)}</p><h2>${esc(s.name)}</h2></div></div>
   <div class="visual-sequence">
     <div class="sequence-step"><span>◉</span><strong>CORPS</strong><small>${zones.map(zoneLabel).join(" · ")}</small></div>
     <b>→</b>
     <div class="sequence-step"><span>◇</span><strong>FONCTION</strong><small>${esc(s.function)}</small></div>
     <b>→</b>
     <div class="sequence-step"><span>✓</span><strong>ACTION</strong><small>${esc(v.action)}</small></div>
   </div>
   <div class="mini-real-body-and-needs">
     <div class="mini-real-body">${anatomyFigure(zones[0]||"chest","front")}</div>
     <div class="need-tiles"><h3>Besoins possibles</h3>${s.needs.map(n=>`<div class="need-tile">◇ ${esc(n)}</div>`).join("")}</div>
   </div>
   <h3>Signes recherchés</h3>
   <div class="symptom-pictos">${ALL_QUESTIONS.filter(q=>q.w&&q.w[k]).sort((a,b)=>b.w[k]-a.w[k]).slice(0,8).map(q=>`<div class="symptom-card"><span>${symbolForStage(q.stage)}</span><small>${esc(shortenQuestion(q.q))}</small></div>`).join("")}</div>
 </section>`;
 document.querySelectorAll(".mini-real-body .anatomy-zone").forEach(b=>b.disabled=true);
}
function historyView(){
 const h=history();app.innerHTML=`<section class="card"><p class="eyebrow">HISTORIQUE LOCAL</p><h2>Panoramas enregistrés</h2>${h.length?h.map(x=>`<article class="history-item"><div class="row"><strong>${new Date(x.date).toLocaleString('fr-FR')}</strong><span>${x.intensity}/10</span></div><p>${x.mix.filter(y=>y.pct>0).slice(0,4).map(y=>`${STATES[y.key]?.name} ${y.pct}%`).join(' · ')}</p>${x.context?`<small>${esc(x.context)}</small>`:''}</article>`).join(''):'<p>Aucun panorama enregistré.</p>'}</section>`;
}
function science(){
 app.innerHTML=`<section class="card"><p class="eyebrow">MÉTHODE ET LIMITES</p><h2>Ce que fait réellement la V5</h2>
 <div class="evidence"><h3>1. Priorité aux documents initiaux</h3><p>Les manifestations explicitement présentes dans les fiches de la neuropsychologue reçoivent les poids les plus élevés.</p></div>
 <div class="evidence"><h3>2. Compléments prudents</h3><p>Fréquence cardiaque, tremblements, transpiration, bouche sèche, nausée, larmes et ralentissement sont ajoutés comme indices complémentaires. Ils sont moins pondérés car ils se chevauchent fortement entre émotions.</p></div>
 <div class="evidence"><h3>3. Absence de signal ≠ absence d’émotion</h3><p>Une réponse « Non » ne retire pas de points. Une réponse « Difficile à dire » est traitée comme une donnée manquante et réduit la confiance.</p></div>
 <div class="evidence"><h3>4. Personnalisation nécessaire</h3><p>Les cartes corporelles sont des tendances de groupe. L’historique doit progressivement aider à reconnaître le profil propre de l’utilisateur.</p></div>
 <div class="notice">La V5 est un outil d’auto-observation. Elle n’est ni un test diagnostique, ni un dispositif médical validé.</div></section>`;
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>setView(b.dataset.view));
const dlg=document.getElementById('settingsDialog');
document.getElementById('settings').onclick=()=>{loadSettings();dlg.showModal()};
document.getElementById('saveSettings').onclick=()=>{const o={font:font.value,contrast:contrast.checked,motion:motion.checked};localStorage.setItem(SETTINGS_KEY,JSON.stringify(o));apply(o);dlg.close()};
function loadSettings(){let o={};try{o=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch{};font.value=o.font||'normal';contrast.checked=!!o.contrast;motion.checked=!!o.motion;apply(o)}
function apply(o){document.body.classList.toggle('font-large',o.font==='large');document.body.classList.toggle('font-xlarge',o.font==='xlarge');document.body.classList.toggle('high-contrast',!!o.contrast);document.body.classList.toggle('reduce-motion',!!o.motion)}

loadSettings();render();
</script>
</body></html>
